<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>輔導紀錄分類系統</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">輔導紀錄</p>
      <h1>樓層、治療師及輔導時間總覽</h1>
      <p class="subtitle">主頁會按「樓層 ＞ 治療師 ＞ 輔導時間」顯示已提交的輔導表格。</p>
    </div>
    <div class="header-actions">
      <button id="reloadSheetBtn" class="secondary">重新載入資料</button>
      <button id="printBtn" class="secondary">列印</button>
      <button id="exportCsvBtn" class="secondary">匯出 CSV</button>
      <button id="exportJsonBtn" class="secondary">匯出 JSON</button>
    </div>
  </header>

  <main class="layout">
    <section class="card dashboard-card">
      <div class="card-title-row">
        <div>
          <h2>樓層分類總覽</h2>
          <p id="sourceStatus" class="hint">準備載入資料表。</p>
        </div>
        <button id="createSessionBtn" class="primary" type="button">Create New Coaching Session</button>
      </div>

      <div class="source-box">
        <label>資料表網址
          <input id="sheetUrlInput" value="https://docs.google.com/spreadsheets/d/1qtmuwLlmNoJPJy5zBiQN-5kf0n_9ztA-_XwTbzdKzRk/edit?gid=0#gid=0" />
        </label>
        <p class="hint">A 欄作為「樓層」分類。資料表需公開或發布成 CSV，網站才可直接讀取。</p>
      </div>

      <div id="centerSummary" class="summary-grid"></div>

      <div class="toolbar">
        <label>按樓層篩選
          <select id="centerFilter">
            <option value="">全部樓層</option>
          </select>
        </label>
        <label>搜尋
          <input id="searchInput" placeholder="搜尋治療師、品牌、內容..." />
        </label>
      </div>

      <div id="groupedRecords" class="grouped-records"></div>
    </section>

    <aside id="formPanel" class="card form-card hidden">
      <div class="card-title-row">
        <h2 id="formTitle">新增輔導紀錄</h2>
        <button id="resetBtn" type="button" class="ghost">清除表格</button>
      </div>

      <form id="coachingForm">
        <input type="hidden" id="recordId" />

        <fieldset>
          <legend>基本資料</legend>
          <div class="grid two">
            <label>樓層
              <input id="center" name="center" required />
            </label>
            <label>治療師
              <input id="staffName" name="staffName" required />
            </label>
            <label>職級
              <input id="positionLevel" name="positionLevel" />
            </label>
            <label>入職日期
              <input id="joinDate" name="joinDate" type="date" />
            </label>
            <label>輔導日期
              <input id="coachingDate" name="coachingDate" type="date" />
            </label>
            <label>輔導時間
              <input id="coachingTime" name="coachingTime" type="datetime-local" />
            </label>
            <label>直屬上司
              <input id="directManager" name="directManager" />
            </label>
            <label>直線下屬
              <input id="directReport" name="directReport" />
            </label>
            <label>品牌
              <input id="brand" name="brand" />
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>表現概況</legend>
          <div class="grid two">
            <label>活躍客戶
              <input id="activeClients" name="activeClients" type="number" min="0" />
            </label>
            <label>平均消費
              <input id="averageSpending" name="averageSpending" type="number" min="0" step="0.01" />
            </label>
            <label>每月銷售目標（公司定）
              <input id="companySalesTarget" name="companySalesTarget" type="number" min="0" step="0.01" />
            </label>
            <label>每月銷售目標（自己定）
              <input id="selfSalesTarget" name="selfSalesTarget" type="number" min="0" step="0.01" />
            </label>
            <label>顧客滿意度平均
              <input id="csatAverage" name="csatAverage" type="number" min="0" max="100" step="0.01" />
            </label>
          </div>
        </fieldset>

        <fieldset class="coaching-content">
          <legend>輔導內容</legend>
          <div class="content-grid">
            <label class="field-block">
              <span>重點內容</span>
              <textarea id="keyContent" name="keyContent" rows="4"></textarea>
            </label>
            <label class="field-block">
              <span>今日輔導後的轉變計劃</span>
              <textarea id="changePlan" name="changePlan" rows="4"></textarea>
            </label>
            <label class="field-block">
              <span>今日轉變後期望達到什麼目標</span>
              <textarea id="expectedGoal" name="expectedGoal" rows="3"></textarea>
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>三個具體方法</legend>
          <p class="hint">想達到以上共識的目標，請填寫三個具體方法。</p>
          <label>方法一
            <textarea id="method1" name="method1" rows="2"></textarea>
          </label>
          <label>方法二
            <textarea id="method2" name="method2" rows="2"></textarea>
          </label>
          <label>方法三
            <textarea id="method3" name="method3" rows="2"></textarea>
          </label>
        </fieldset>

        <fieldset>
          <legend>跟進及評分</legend>
          <div class="grid two">
            <label>下次見面時間預約
              <input id="nextMeeting" name="nextMeeting" type="datetime-local" />
            </label>
            <label>同事 Anchor？
              <input id="staffAnchor" name="staffAnchor" />
            </label>
            <label>我的聲譽分
              <input id="myRating" name="myRating" type="number" min="0" max="10" step="0.1" />
            </label>
            <label>我的文化旅遊評分
              <input id="cultureJourneyRating" name="cultureJourneyRating" type="number" min="0" max="10" step="0.1" />
            </label>
          </div>
        </fieldset>

        <div class="form-actions">
          <button type="submit" class="primary">儲存本機紀錄</button>
          <button id="cancelEditBtn" type="button" class="secondary hidden">取消編輯</button>
        </div>
      </form>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
