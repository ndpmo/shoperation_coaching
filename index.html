<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>輔導紀錄分類系統</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">輔導紀錄</p>
      <h1>樓層、治療師及輔導時間總覽</h1>
      <p class="subtitle">主頁會按「樓層 ＞ 治療師 ＞ 輔導時間」顯示已提交的輔導表格。</p>
    </div>
    <div class="header-actions">
      <button id="reloadSheetBtn" class="secondary">重新載入資料</button>
      <button id="printBtn" class="secondary">列印</button>
      <button id="exportCsvBtn" class="secondary">匯出 CSV</button>
      <button id="exportJsonBtn" class="secondary">匯出 JSON</button>
    </div>
  </header>

  <main class="layout">
    <section class="card dashboard-card">
      <div class="card-title-row">
        <div>
          <h2>樓層分類總覽</h2>
          <p id="sourceStatus" class="hint">準備載入資料表。</p>
        </div>
        <button id="createSessionBtn" class="primary" type="button">Create New Coaching Session</button>
      </div>

      <div class="source-box">
        <label>資料表網址
          <input id="sheetUrlInput" value="https://docs.google.com/spreadsheets/d/1qtmuwLlmNoJPJy5zBiQN-5kf0n_9ztA-_XwTbzdKzRk/edit?gid=0#gid=0" />
        </label>
        <p class="hint">A 欄作為「樓層」分類。資料表需公開或發布成 CSV，網站才可直接讀取。</p>
      </div>

      <div id="centerSummary" class="summary-grid"></div>

      <div class="toolbar">
        <label>按樓層篩選
          <select id="centerFilter">
            <option value="">全部樓層</option>
          </select>
        </label>
        <label>搜尋
          <input id="searchInput" placeholder="搜尋治療師、品牌、內容..." />
        </label>
      </div>

      <div id="groupedRecords" class="grouped-records"></div>
    </section>

    <aside id="formPanel" class="card form-card hidden">
      <div class="card-title-row">
        <h2 id="formTitle">新增輔導紀錄</h2>
        <button id="resetBtn" type="button" class="ghost">清除表格</button>
      </div>

      <form id="coachingForm">
        <input type="hidden" id="recordId" />

        <fieldset>
          <legend>基本資料</legend>
          <div class="grid two">
            <label>樓層
              <select id="center" name="center" required>
                <option value="">請選擇樓層</option>
              </select>
            </label>
            <label>治療師
              <select id="staffName" name="staffName" required>
                <option value="">請先選擇樓層</option>
              </select>
            </label>
            <label>職級
              <input id="positionLevel" name="positionLevel" readonly />
            </label>
            <label>入職日期
              <input id="joinDate" name="joinDate" type="date" />
            </label>
            <label>輔導日期
              <input id="coachingDate" name="coachingDate" type="date" />
            </label>
            <label>輔導時間
              <input id="coachingTime" name="coachingTime" type="datetime-local" />
            </label>
            <label>直屬上司
              <input id="directManager" name="directManager" />
            </label>
            <label>直線下屬
              <input id="directReport" name="directReport" />
            </label>
            <label>品牌
              <input id="brand" name="brand" />
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>表現概況</legend>
          <div class="grid two">
            <label>活躍客戶
              <input id="activeClients" name="activeClients" type="number" min="0" />
            </label>
            <label>過往6個月平均消費
              <input id="averageSpending" name="averageSpending" type="number" min="0" step="0.01" readonly />
            </label>
            <label>過往12個月平均消費
              <input id="averageSpending12" name="averageSpending12" type="number" min="0" step="0.01" readonly />
            </label>
            <label>每月銷售目標（公司定）
              <input id="companySalesTarget" name="companySalesTarget" type="number" min="0" step="0.01" />
            </label>
            <label>每月銷售目標（自己定）
              <input id="selfSalesTarget" name="selfSalesTarget" type="number" min="0" step="0.01" />
            </label>
            <label>顧客滿意度平均
              <input id="csatAverage" name="csatAverage" type="number" min="0" max="100" step="0.01" />
            </label>
          </div>
        </fieldset>

        <fieldset class="coaching-content">
          <legend>輔導內容</legend>
          <div class="content-grid">
            <label class="field-block">
              <span>重點內容</span>
              <textarea id="keyContent" name="keyContent" rows="4"></textarea>
            </label>
            <label class="field-block">
              <span>今日輔導後的轉變計劃</span>
              <textarea id="changePlan" name="changePlan" rows="4"></textarea>
            </label>
            <label class="field-block">
              <span>今日轉變後期望達到什麼目標</span>
              <textarea id="expectedGoal" name="expectedGoal" rows="3"></textarea>
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>三個具體方法</legend>
          <p class="hint">想達到以上共識的目標，請填寫三個具體方法。</p>
          <label>方法一
            <textarea id="method1" name="method1" rows="2"></textarea>
          </label>
          <label>方法二
            <textarea id="method2" name="method2" rows="2"></textarea>
          </label>
          <label>方法三
            <textarea id="method3" name="method3" rows="2"></textarea>
          </label>
        </fieldset>

        <fieldset>
          <legend>跟進及評分</legend>
          <div class="grid two">
            <label>下次見面時間預約
              <input id="nextMeeting" name="nextMeeting" type="datetime-local" />
            </label>
            <label>同事 Anchor？
              <input id="staffAnchor" name="staffAnchor" />
            </label>
            <label>我的評分
              <input id="cultureJourneyRating" name="cultureJourneyRating" type="number" min="0" max="10" step="0.1" />
            </label>
          </div>
        </fieldset>

        <div class="form-actions">
          <button type="submit" class="primary">儲存本機紀錄</button>
          <button id="cancelEditBtn" type="button" class="secondary hidden">取消編輯</button>
        </div>
      </form>
    </aside>
  </main>

  <script>
const STORAGE_KEY = 'coachingFormRecords.v3';
const DEFAULT_SHEET_ID = '1qtmuwLlmNoJPJy5zBiQN-5kf0n_9ztA-_XwTbzdKzRk';
const DEFAULT_GID = '0';

const form = document.getElementById('coachingForm');
const recordIdInput = document.getElementById('recordId');
const searchInput = document.getElementById('searchInput');
const centerFilter = document.getElementById('centerFilter');
const groupedRecords = document.getElementById('groupedRecords');
const centerSummary = document.getElementById('centerSummary');
const sourceStatus = document.getElementById('sourceStatus');
const sheetUrlInput = document.getElementById('sheetUrlInput');
const formTitle = document.getElementById('formTitle');
const formPanel = document.getElementById('formPanel');
const createSessionBtn = document.getElementById('createSessionBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');

let sheetRecords = [];
let allRecords = [];

const fields = [
  'center','staffName','positionLevel','joinDate','coachingDate','coachingTime','directManager','directReport','brand',
  'activeClients','averageSpending','averageSpending12','csatAverage','companySalesTarget','selfSalesTarget',
  'keyContent','changePlan','expectedGoal','method1','method2','method3',
  'nextMeeting','staffAnchor','cultureJourneyRating'
];

const headerAliases = {
  center: ['樓層', '中心', 'Floor', 'Center', 'centre', 'Centre'],
  staffName: ['治療師', '同事名', '姓名', '員工姓名', 'Therapist', 'Staff name', 'Name'],
  positionLevel: ['職級', '級別', 'Position', 'position', 'Level', 'Job Title', 'Title'],
  joinDate: ['入職日期', 'Join date'],
  coachingDate: ['輔導日期', '日期', 'Coaching date'],
  coachingTime: ['輔導時間', 'Coaching time', 'Coaching Time', 'Time'],
  directManager: ['直屬上司', '上司', 'Direct manager', 'Direct company'],
  directReport: ['直線下屬', '下屬', 'Direct report'],
  brand: ['品牌', 'Brand'],
  activeClients: ['活躍客戶', 'Active clients'],
  averageSpending: ['過往6個月平均消費', '平均消費', 'Average spending 6 months', '6 month average spending'],
  averageSpending12: ['過往12個月平均消費', 'Average spending 12 months', '12 month average spending'],
  csatAverage: ['顧客滿意度平均', 'CSAT', 'csat'],
  companySalesTarget: ['每月銷售目標（公司定）', '公司定銷售目標'],
  selfSalesTarget: ['每月銷售目標（自己定）', '自己定銷售目標'],
  keyContent: ['重點內容', 'Key content'],
  changePlan: ['今日輔導後的轉變計劃', '轉變計劃', 'Change plan'],
  expectedGoal: ['今日轉變後期望達到什麼目標', '期望目標', 'Expected goal'],
  method1: ['方法一', '1'],
  method2: ['方法二', '2'],
  method3: ['方法三', '3'],
  nextMeeting: ['下次見面時間預約', '下次見面時間'],
  staffAnchor: ['同事 Anchor？', '同事Anchor', 'Anchor'],
  cultureJourneyRating: ['我的評分', '我的評分', '文化旅遊評分']
};

function getLocalRecords() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}

function saveLocalRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function getCsvUrl() {
  const input = sheetUrlInput.value.trim();
  const idMatch = input.match(/\/spreadsheets\/d\/([^/]+)/);
  const gidMatch = input.match(/[?&#]gid=(\d+)/);
  const id = idMatch ? idMatch[1] : DEFAULT_SHEET_ID;
  const gid = gidMatch ? gidMatch[1] : DEFAULT_GID;
  return `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&gid=${gid}`;
}

function parseCsv(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"' && insideQuotes && next === '"') {
      cell += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === ',' && !insideQuotes) {
      row.push(cell);
      cell = '';
    } else if ((char === '\n' || char === '\r') && !insideQuotes) {
      if (char === '\r' && next === '\n') i++;
      row.push(cell);
      if (row.some(value => value.trim() !== '')) rows.push(row);
      row = [];
      cell = '';
    } else {
      cell += char;
    }
  }

  row.push(cell);
  if (row.some(value => value.trim() !== '')) rows.push(row);
  return rows;
}

function findColumn(headers, aliases, fallbackIndex) {
  const clean = value => String(value || '').trim().toLowerCase();
  const normalizedHeaders = headers.map(clean);
  for (const alias of aliases) {
    const index = normalizedHeaders.indexOf(clean(alias));
    if (index !== -1) return index;
  }
  return fallbackIndex;
}

function isExcludedCenter(value) {
  const center = String(value || '').trim().toLowerCase();
  return center === 'grand total' || center === 'total';
}

function rowsToRecords(rows) {
  if (!rows.length) return [];
  const headers = rows[0];
  const columnMap = {};
  Object.entries(headerAliases).forEach(([field, aliases]) => {
    columnMap[field] = findColumn(headers, aliases, field === 'center' ? 0 : field === 'staffName' ? 1 : field === 'averageSpending' ? 4 : field === 'averageSpending12' ? 5 : -1);
  });

  return rows.slice(1).map((row, index) => {
    const record = { id: `sheet-${index}`, source: '資料表' };
    fields.forEach(field => {
      const col = columnMap[field];
      record[field] = col >= 0 ? String(row[col] || '').trim() : '';
    });
    if (!record.center) record.center = String(row[0] || '未分類').trim() || '未分類';
    return record;
  }).filter(record =>
    Object.values(record).some(value => String(value || '').trim() !== '') &&
    !isExcludedCenter(record.center)
  );
}

async function loadSheetRecords() {
  sourceStatus.textContent = '正在載入資料表...';
  try {
    const response = await fetch(getCsvUrl(), { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();

    if (text.includes('<!DOCTYPE html') || text.includes('<html')) {
      throw new Error('資料表不是公開 CSV');
    }

    sheetRecords = rowsToRecords(parseCsv(text));
    sourceStatus.textContent = `已載入資料表紀錄：${sheetRecords.length} 筆`;
  } catch (error) {
    sheetRecords = [];
    sourceStatus.textContent = '未能讀取資料表。請確認資料表已發布成公開 CSV，或使用已授權的資料接口。';
  }
  refreshData();
  populateFormDropdowns();
}

function refreshData() {
  allRecords = [...sheetRecords, ...getLocalRecords().map(record => ({ ...record, source: '本機' }))].filter(record => !isExcludedCenter(record.center));
  updateCenterFilter();
  renderDashboard();
}

function updateCenterFilter() {
  const current = centerFilter.value;
  const centers = [...new Set(allRecords.map(r => r.center || '未分類樓層'))].sort();
  centerFilter.innerHTML = '<option value="">全部樓層</option>' + centers.map(center => `<option value="${escapeHtml(center)}">${escapeHtml(center)}</option>`).join('');
  centerFilter.value = centers.includes(current) ? current : '';
}

function getFilteredRecords() {
  const query = searchInput.value.toLowerCase().trim();
  const selectedCenter = centerFilter.value;
  return allRecords.filter(record => {
    const matchesCenter = !selectedCenter || (record.center || '未分類') === selectedCenter;
    const matchesQuery = !query || Object.values(record).join(' ').toLowerCase().includes(query);
    return matchesCenter && matchesQuery;
  });
}

function renderDashboard() {
  const records = getFilteredRecords();
  const grouped = groupByCenter(records);
  renderSummary(grouped);
  renderGroups(grouped);
}

function groupByCenter(records) {
  return records.reduce((acc, record) => {
    const center = record.center || '未分類樓層';
    if (!acc[center]) acc[center] = [];
    acc[center].push(record);
    return acc;
  }, {});
}

function renderSummary(grouped) {
  const entries = Object.entries(grouped).sort((a, b) => b[1].length - a[1].length);
  if (!entries.length) {
    centerSummary.innerHTML = '<p class="hint">暫時沒有紀錄。</p>';
    return;
  }
  centerSummary.innerHTML = entries.map(([center, records]) => `
    <article class="summary-card">
      <strong>${records.length}</strong>
      <span>${escapeHtml(center)}</span>
    </article>
  `).join('');
}

function renderGroups(grouped) {
  const entries = Object.entries(grouped).sort((a, b) => a[0].localeCompare(b[0]));
  if (!entries.length) {
    groupedRecords.innerHTML = '<p class="hint">暫時沒有紀錄。</p>';
    return;
  }

  groupedRecords.innerHTML = entries.map(([floor, records]) => {
    const therapistGroups = records.reduce((acc, record) => {
      const therapist = record.staffName || '未填治療師';
      if (!acc[therapist]) acc[therapist] = [];
      acc[therapist].push(record);
      return acc;
    }, {});

    return `
      <section class="center-group">
        <div class="center-group-header">
          <h3>樓層：${escapeHtml(floor)}</h3>
          <span class="badge">${records.length} 筆</span>
        </div>

        <div class="therapist-list">
          ${Object.entries(therapistGroups).sort((a, b) => a[0].localeCompare(b[0])).map(([therapist, therapistRecords]) => `
            <article class="therapist-card">
              <div class="therapist-header">
                <h4>治療師：${escapeHtml(therapist)}</h4>
                <span class="badge">${therapistRecords.length} 次輔導</span>
              </div>

              <div class="session-list">
                ${therapistRecords.map(record => {
                  const time = record.coachingTime || record.coachingDate || record.nextMeeting || '未填輔導時間';
                  return `
                    <div class="session-row">
                      <div>
                        <strong>輔導時間：${escapeHtml(formatDateTime(time))}</strong>
                        <p>${escapeHtml(record.keyContent || record.changePlan || record.expectedGoal || '未填輔導內容')}</p>
                      </div>
                      <div class="record-actions">
                        ${record.source === '本機' ? `
                          <button class="secondary" onclick="editRecord('${record.id}')">編輯</button>
                          <button class="danger" onclick="deleteRecord('${record.id}')">刪除</button>
                        ` : '<span class="hint">資料表</span>'}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </article>
          `).join('')}
        </div>
      </section>
    `;
  }).join('');
}

function showFormPanel() {
  formPanel.classList.remove('hidden');
  formPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function hideFormPanel() {
  formPanel.classList.add('hidden');
}

function formatDateTime(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('zh-HK', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });
}


function getTherapistSourceRecords() {
  return sheetRecords.filter(record =>
    !isExcludedCenter(record.center) &&
    String(record.center || '').trim() &&
    String(record.staffName || '').trim()
  );
}

function populateFormDropdowns(selectedFloor = '', selectedTherapist = '') {
  const floorSelect = document.getElementById('center');
  const therapistSelect = document.getElementById('staffName');
  if (!floorSelect || !therapistSelect) return;

  const floors = [...new Set(getTherapistSourceRecords().map(record => record.center).filter(Boolean))].sort();
  const currentFloor = selectedFloor || floorSelect.value;

  floorSelect.innerHTML = '<option value="">請選擇樓層</option>' +
    floors.map(floor => `<option value="${escapeHtml(floor)}">${escapeHtml(floor)}</option>`).join('');

  if (currentFloor && floors.includes(currentFloor)) {
    floorSelect.value = currentFloor;
  }

  updateTherapistOptions(selectedTherapist || therapistSelect.value);
}

function updateTherapistOptions(selectedTherapist = '') {
  const floorSelect = document.getElementById('center');
  const therapistSelect = document.getElementById('staffName');
  if (!floorSelect || !therapistSelect) return;

  const selectedFloor = floorSelect.value;
  const source = getTherapistSourceRecords().filter(record => !selectedFloor || record.center === selectedFloor);
  const therapists = [...new Set(source.map(record => record.staffName).filter(Boolean))].sort();

  therapistSelect.innerHTML = selectedFloor
    ? '<option value="">請選擇治療師</option>'
    : '<option value="">請先選擇樓層</option>';

  therapistSelect.innerHTML += therapists
    .map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`)
    .join('');

  if (selectedTherapist && therapists.includes(selectedTherapist)) {
    therapistSelect.value = selectedTherapist;
  }

  autofillTherapistDetails();
}

function autofillTherapistDetails() {
  const floor = document.getElementById('center')?.value || '';
  const therapist = document.getElementById('staffName')?.value || '';
  const positionInput = document.getElementById('positionLevel');
  const avg6Input = document.getElementById('averageSpending');
  const avg12Input = document.getElementById('averageSpending12');

  const match = getTherapistSourceRecords().find(record =>
    record.center === floor &&
    record.staffName === therapist
  ) || getTherapistSourceRecords().find(record =>
    record.staffName === therapist
  );

  if (positionInput) positionInput.value = match?.positionLevel || '';
  if (avg6Input) avg6Input.value = match?.averageSpending || '';
  if (avg12Input) avg12Input.value = match?.averageSpending12 || '';
}

function autofillPosition() {
  autofillTherapistDetails();
}


function readForm() {
  const data = {};
  fields.forEach(field => data[field] = (document.getElementById(field)?.value || '').trim());
  data.id = recordIdInput.value || crypto.randomUUID();
  data.updatedAt = new Date().toISOString();
  return data;
}

function fillForm(record) {
  populateFormDropdowns(record.center || '', record.staffName || '');
  fields.forEach(field => {
    const element = document.getElementById(field);
    if (element) element.value = record[field] || '';
  });
  autofillTherapistDetails();
  recordIdInput.value = record.id;
  formTitle.textContent = '編輯輔導紀錄';
  cancelEditBtn.classList.remove('hidden');
  showFormPanel();
}

function clearForm() {
  form.reset();
  recordIdInput.value = '';
  formTitle.textContent = '新增輔導紀錄';
  cancelEditBtn.classList.add('hidden');
  populateFormDropdowns();
  hideFormPanel();
}

function editRecord(id) {
  const record = getLocalRecords().find(item => item.id === id);
  if (record) fillForm(record);
}

function deleteRecord(id) {
  if (!confirm('確定要刪除此紀錄？')) return;
  saveLocalRecords(getLocalRecords().filter(item => item.id !== id));
  refreshData();
}

function exportFile(type) {
  const records = getFilteredRecords();
  const filename = `coaching-records-by-floor.${type}`;
  let content;
  let mime;

  if (type === 'json') {
    content = JSON.stringify(records, null, 2);
    mime = 'application/json;charset=utf-8;';
  } else {
    const headers = ['樓層','治療師','職級','入職日期','輔導日期','輔導時間','直屬上司','直線下屬','品牌','活躍客戶','過往6個月過往6個月平均消費','過往12個月過往6個月平均消費','顧客滿意度平均','每月銷售目標（公司定）','每月銷售目標（自己定）','重點內容','轉變計劃','期望目標','方法一','方法二','方法三','下次見面時間','同事 Anchor','我的評分','來源'];
    const keys = [...fields, 'source'];
    content = [headers, ...records.map(record => keys.map(key => record[key] || ''))]
      .map(row => row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(','))
      .join('\n');
    mime = 'text/csv;charset=utf-8;';
  }

  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
  }[char]));
}

form.addEventListener('submit', event => {
  event.preventDefault();
  const data = readForm();
  const records = getLocalRecords();
  const index = records.findIndex(record => record.id === data.id);
  if (index >= 0) records[index] = data;
  else records.unshift(data);
  saveLocalRecords(records);
  clearForm();
  refreshData();
});
